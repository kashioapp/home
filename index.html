<!DOCTYPE html>
<html>
<head>
<title>Kashio</title>

<link rel="icon" href="./favicon.png">
<link rel="stylesheet" href="./style.css">
<script src="./script.js" defer></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<img src="./bannerlogo.png" class="logo">

<a href="index.html">Dashboard</a>
<a href="challenges.html">Challenges</a>
<a href="submit.html">Submit</a>
<a href="about.html">About</a>
<a href="how.html">How</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="top-right">

<div class="search-box">
<input placeholder="Search...">
</div>

<div class="icon-btn"></div>
<div class="icon-btn"></div>
<div class="icon-btn"></div>
<div class="icon-btn"></div>

</div>

</div>

<div class="content">

<h1>Dashboard</h1>

<!-- VIP CARD -->
<div class="vip-card">
<div>
<h3>VIP Progress</h3>
<p>0%</p>
</div>
<div class="vip-star"></div>
</div>

<h2>Live Challenges</h2>

<div class="cards">

<div class="challenge-card">
<h3>Fortnite</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

<div class="challenge-card">
<h3>Valorant</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

<div class="challenge-card">
<h3>Warzone</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

</div>

</div>

</div>
</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">

<div class="chat-header">
Support
<span onclick="toggleChat()">✖</span>
</div>

<div class="chat-messages" id="chatMessages">
<div class="bot-msg">Support is currently offline.</div>
<div class="bot-msg">Email: contact@kashioapp.com</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</body>
</html>
