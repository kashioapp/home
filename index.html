<!DOCTYPE html>
<html>
<head>
<title>Kashio</title>

<link rel="icon" href="./favicon.png">
<link rel="stylesheet" href="./style.css">
<script src="./script.js" defer></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<img src="./bannerlogo.png" class="logo">

<div class="nav">
<a href="#">Dashboard</a>
<a href="#">Challenges</a>
<a href="#">Submit</a>
<a href="#">About</a>
<a href="#">How</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">

<button onclick="toggleSidebar()" class="menu">☰</button>

<input class="search" placeholder="Search games...">

<div class="top-icons">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
</div>

</div>

<!-- CONTENT -->
<div class="content">

<h1>Dashboard</h1>

<div class="vip-box">
<div>
<h3>VIP Progress</h3>
<p id="vipText">0%</p>
</div>
<div class="vip-icon"></div>
</div>

<h2>Live Challenges</h2>

<div class="cards">

<div class="card">
<h3>Fortnite</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

<div class="card">
<h3>Valorant</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

<div class="card">
<h3>Warzone</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

</div>

</div>

</div>
</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()"></div>

<!-- CHAT -->
<div class="chat" id="chat">

<div class="chat-header">
Support
<span onclick="toggleChat()">✖</span>
</div>

<div class="chat-status" id="chatStatus">
Status: Offline
</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input">
<input id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</body>
</html>
