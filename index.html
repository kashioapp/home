<!DOCTYPE html>
<html>
<head>
<title>Kashio</title>

<base href="/home/">

<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">
    <img src="bannerlogo.png">
</div>

<nav>
    <img src="bannerlogo.png" height="40">

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="how.html">How It Works</a>
        <a href="challenges.html">Challenges</a>
        <a href="submit.html">Submit</a>
    </div>
</nav>

<section class="hero">
    <h1>Compete. Win. Dominate.</h1>
    <p>24/7 skill-based gaming challenges</p>
    <button class="main-btn">Start Playing</button>
</section>

<section class="section">
    <h2>Your VIP Progress</h2>
    <div class="vip-bar">
        <div class="vip-fill"></div>
    </div>
    <p>Progress: 0%</p>
</section>

<section class="section">
    <h2>Live Challenges</h2>

    <div class="cards">
        <div class="card"><h3>Fortnite</h3><p>$5</p><button>Join</button></div>
        <div class="card"><h3>Valorant</h3><p>$5</p><button>Join</button></div>
        <div class="card"><h3>Warzone</h3><p>$5</p><button>Join</button></div>
    </div>
</section>

<section class="section">
    <h2>Promo Code</h2>
    <input id="promoInput">
    <button onclick="redeemCode()">Redeem</button>
    <p id="promoResult"></p>
</section>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatBox">
    <h3>Support</h3>
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="script.js"></script>

</body>
</html>
