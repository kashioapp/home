<!DOCTYPE html>
<html>
<head>
<title>Kashio</title>

<link rel="icon" href="./favicon.png">
<link rel="stylesheet" href="./style.css">
<script src="./script.js" defer></script>

<!-- ICONS -->
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<img src="./bannerlogo.png" class="logo">

<div class="nav">
<a href="index.html"><i class="ri-dashboard-line"></i> Dashboard</a>
<a href="challenges.html"><i class="ri-gamepad-line"></i> Challenges</a>
<a href="submit.html"><i class="ri-upload-line"></i> Submit</a>
<a href="about.html"><i class="ri-information-line"></i> About</a>
<a href="how.html"><i class="ri-question-line"></i> How</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">

<button onclick="toggleSidebar()" class="menu">
<i class="ri-menu-line"></i>
</button>

<input class="search" placeholder="Search games...">

<div class="top-icons">
<i class="ri-search-line"></i>
<i class="ri-user-line"></i>
<i class="ri-notification-3-line"></i>
<i class="ri-message-3-line"></i>
</div>

</div>

<div class="content">

<h1>Dashboard</h1>

<div class="vip-box">
<div>
<h3>VIP Progress</h3>
<p id="vipText">0%</p>
</div>
<div class="vip-icon"></div>
</div>

<h2>Live Challenges</h2>

<div class="cards">

<div class="card">
<h3>Fortnite</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

<div class="card">
<h3>Valorant</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

<div class="card">
<h3>Warzone</h3>
<p>$5 Entry</p>
<button>Join</button>
</div>

</div>

</div>

</div>
</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">
<i class="ri-customer-service-2-line"></i>
</div>

<!-- CHAT -->
<div class="chat" id="chat">

<div class="chat-header">
Support
<span onclick="toggleChat()">✖</span>
</div>

<div class="chat-status" id="chatStatus">
Status: Offline
</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input">
<input id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</body>
</html>
